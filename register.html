<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; 
            min-height: 100vh;
        }

   
        .navbar {
            background-color: #000080; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-size: 24px;
            font-weight: bold;
        }

        .navbar-links {
            display: flex;
            gap: 20px;
        }

        .navbar-links a {
            color: white;
            text-decoration: none;
            font-size: 18px;
        }

        .navbar-links a:hover {
            text-decoration: underline;
        }

   
        .main-content {
            flex: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }


        .form-container {
            width: 500px;                             
            background-color: #ffffff;                
            border-radius: 8px;                       
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); 
            padding: 30px;
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: #333333;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 5px;
            color: #444444;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="tel"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
            height: 80px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
        }

        .radio-group label {
            font-weight: normal;
            margin-bottom: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button[type="submit"] {
            background-color: #007bff;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #0056b3;
        }

        button[type="reset"] {
            background-color: #6c757d;
            color: white;
        }

        button[type="reset"]:hover {
            background-color: #545b62;
        }
        footer{
            background: rgba(255, 42, 42, 0.79);
            color: white;
            text-align: center;
            padding: 20px ;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="navbar-brand">Paññāsāstra University of Cambodia - PUC</div>
        <div class="navbar-links">
            <a href="/Home page.html">Home</a>
            <a href="/course.html">Course</a>
            <a href="/gallary.html">Gallery</a>
            <a href="/register.html">Register</a>
            <a href="/contect.html">Contact</a>
        </div>
    </div>

    <div class="main-content">
        <div class="form-container">
            <h2>Student Registration</h2>
            <form action="#" method="POST">
                
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="example@email.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" required placeholder="012-345-678">
                </div>

                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob" name="dob" required>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="male" required> Male</label>
                        <label><input type="radio" name="gender" value="female"> Female</label>
                        <label><input type="radio" name="gender" value="other"> Other</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="course">Course</label>
                    <select id="course" name="course" required>
                        <option value="" disabled selected>Select your course</option>
                        <option value="ite">Information Technology Engineering</option>
                        <option value="cs">Computer Science</option>
                        <option value="is">Information Systems</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" required placeholder="Enter your current address..."></textarea>
                </div>

                <div style="margin-bottom: 15px; display: flex; align-items: center; gap: 5px;">
                    <input type="checkbox" id="terms" name="terms" required> 
                    <label for="terms" style="font-weight: normal; margin: 0; cursor: pointer;">I agree to the Terms and Conditions</label>
                </div>

                <div class="button-group">
                    <button type="submit">Submit</button>
                    <button type="reset">Reset</button>
                </div>

            </form>
        </div>
    </div>
    <footer>@Paññāsāstra University of Cambodia - PUC</footer>
</body>
</html>
