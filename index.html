<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        /* Body Padding */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
           
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px; 
            max-width: 1200px;
            margin: 40px auto 0 auto;
        }

    
        .gallery-item {
            overflow: hidden;
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            background-color: #fff;
            aspect-ratio: 4 / 3; 
        }

        /* Image Styling */
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: #ffffff; 
            display: block;
            transition: transform 0.3s ease; 
        }
         nav{
            display: flex;
            justify-content: space-between;
            align-content: center;
            padding: 20px 50px;
            background: rgb(15, 1, 118);
        }

        /* Hover Zoom Effect */
        .gallery-item:hover img {
            transform: scale(1.1); 
        }
        .logo{
            color: rgb(255, 255, 255);
            font-size: 46px;
            font-weight: bold;
        }
        nav ul{
            display:flex;
            list-style: none;
            font-size: 38px;
        }
        nav ul li{
            margin-left: 20px;
        }
        nav ul li a{
            text-decoration: none;
            color: rgb(255, 255, 255);
            cursor: pointer;
        }
        nav ul li a:hover{
            color: gold;
        }
        .hero{
            height: 90vh;
            background-image: url("img/image copy 4.png");
            background-size:cover ;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            color: rgb(248, 32, 32);
            text-align: center;
        }
        .hero h1{
            font-size: 60px;
            margin-bottom: 15px;
        }
        .hero p{
            font-size: 20px;
            padding: 20px;
        }
          footer{
            background: rgba(255, 42, 42, 0.79);
            color: white;
            text-align: center;
            padding: 20px ;
        }

    </style>
</head>
